<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talc Lead Form - Phonexa Spec</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --danger: #ef4444;
      --border: #374151;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #020617, #0f172a);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    p {
      color: var(--muted);
      line-height: 1.4;
    }

    fieldset {
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      padding: 14px;
    }

    legend {
      color: #d1d5db;
      font-size: 13px;
      padding: 0 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      color: #d1d5db;
    }

    label .req {
      color: var(--danger);
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      padding: 10px;
      font-size: 14px;
    }

    select option {
      background: #0b1220;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      color: #052e16;
      border: 0;
      font-weight: 700;
      margin-top: 8px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      display: none;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .status.ok {
      display: block;
      background: #052e16;
      color: #bbf7d0;
      border: 1px solid #15803d;
    }

    .status.error {
      display: block;
      background: #450a0a;
      color: #fecaca;
      border: 1px solid #b91c1c;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Talc Lead Form</h1>

    <form id="leadForm">

      <!-- ── REQUIRED ─────────────────────────────────────────── -->
      <fieldset>
        <legend>Required (Phonexa spec)</legend>
        <div class="grid">

          <div class="field">
            <label for="firstName">First Name <span class="req">*</span></label>
            <input id="firstName" name="firstName" required />
          </div>

          <div class="field">
            <label for="lastName">Last Name <span class="req">*</span></label>
            <input id="lastName" name="lastName" required />
          </div>

          <div class="field">
            <label for="phoneNumber">Phone Number <span class="req">*</span></label>
            <input id="phoneNumber" name="phoneNumber" placeholder="5555555555" required />
            <span class="small">10–11 digits, numeric only</span>
          </div>

          <div class="field">
            <label for="email">Email <span class="req">*</span></label>
            <input id="email" name="email" type="email" required />
          </div>

          <div class="field full">
            <label for="trustedFormURL">Trusted Form Certificate URL <span class="req">*</span></label>
            <input id="trustedFormURL" name="trustedFormURL" type="url" placeholder="https://cert.trustedform.com/..."
              required />
          </div>

        </div>
      </fieldset>

      <!-- ── OPTIONAL – ADDRESS ───────────────────────────────── -->
      <fieldset>
        <legend>Optional – Address (Phonexa spec)</legend>
        <div class="grid">

          <div class="field">
            <label for="zip">Zip</label>
            <input id="zip" name="zip" placeholder="90210" maxlength="8" />
            <span class="small">5–8 numeric digits</span>
          </div>

          <div class="field">
            <label for="state">State <span class="req">*</span></label>
            <select id="state" name="state" required>
              <option value="">— Select State —</option>
              <option value="AL">AL – Alabama</option>
              <option value="AK">AK – Alaska</option>
              <option value="AZ">AZ – Arizona</option>
              <option value="AR">AR – Arkansas</option>
              <option value="CA">CA – California</option>
              <option value="CO">CO – Colorado</option>
              <option value="CT">CT – Connecticut</option>
              <option value="DC">DC – Washington D.C.</option>
              <option value="DE">DE – Delaware</option>
              <option value="FL">FL – Florida</option>
              <option value="GA">GA – Georgia</option>
              <option value="HI">HI – Hawaii</option>
              <option value="ID">ID – Idaho</option>
              <option value="IL">IL – Illinois</option>
              <option value="IN">IN – Indiana</option>
              <option value="IA">IA – Iowa</option>
              <option value="KS">KS – Kansas</option>
              <option value="KY">KY – Kentucky</option>
              <option value="LA">LA – Louisiana</option>
              <option value="ME">ME – Maine</option>
              <option value="MD">MD – Maryland</option>
              <option value="MA">MA – Massachusetts</option>
              <option value="MI">MI – Michigan</option>
              <option value="MN">MN – Minnesota</option>
              <option value="MS">MS – Mississippi</option>
              <option value="MO">MO – Missouri</option>
              <option value="MT">MT – Montana</option>
              <option value="NE">NE – Nebraska</option>
              <option value="NV">NV – Nevada</option>
              <option value="NH">NH – New Hampshire</option>
              <option value="NJ">NJ – New Jersey</option>
              <option value="NM">NM – New Mexico</option>
              <option value="NY">NY – New York</option>
              <option value="NC">NC – North Carolina</option>
              <option value="ND">ND – North Dakota</option>
              <option value="OH">OH – Ohio</option>
              <option value="OK">OK – Oklahoma</option>
              <option value="OR">OR – Oregon</option>
              <option value="PA">PA – Pennsylvania</option>
              <option value="RI">RI – Rhode Island</option>
              <option value="SC">SC – South Carolina</option>
              <option value="SD">SD – South Dakota</option>
              <option value="TN">TN – Tennessee</option>
              <option value="TX">TX – Texas</option>
              <option value="UT">UT – Utah</option>
              <option value="VT">VT – Vermont</option>
              <option value="VA">VA – Virginia</option>
              <option value="WA">WA – Washington</option>
              <option value="WV">WV – West Virginia</option>
              <option value="WI">WI – Wisconsin</option>
              <option value="WY">WY – Wyoming</option>
            </select>
          </div>

          <div class="field">
            <label for="city">City</label>
            <input id="city" name="city" placeholder="Los Angeles" />
          </div>

          <div class="field full">
            <label for="address">Address</label>
            <input id="address" name="address" placeholder="123 Easy Street" />
          </div>

        </div>
      </fieldset>

      <button id="submitBtn" type="submit">Submit Lead</button>
      <div id="status" class="status" aria-live="polite"></div>

    </form>
  </div>

  <script>
    const form = document.getElementById("leadForm");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function digitsOnly(value) {
      return (value || "").toString().replace(/\D/g, "");
    }

    function validPhone(phone) {
      const d = digitsOnly(phone);
      return d.length === 10 || d.length === 11;
    }

    function validZip(zip) {
      if (!zip) return true; // optional
      return /^\d{5,8}$/.test(zip);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusEl.className = "status";

      const data = new FormData(form);
      const get = (name) => (data.get(name) || "").toString().trim();

      const phoneNumber = digitsOnly(get("phoneNumber"));
      const zip = get("zip");
      const state = get("state").toUpperCase();

      // ── Client-side validation ───────────────────────────────
      if (!validPhone(get("phoneNumber"))) {
        setStatus("Phone number must be 10–11 digits (numbers only).", "error");
        return;
      }

      if (zip && !validZip(zip)) {
        setStatus("Zip must be 5–8 numeric digits.", "error");
        return;
      }

      if (!state) {
        setStatus("Please select a state.", "error");
        return;
      }

      const required = {
        firstName: get("firstName"),
        lastName: get("lastName"),
        email: get("email"),
        trustedFormURL: get("trustedFormURL"),
      };
      const missing = Object.entries(required).filter(([, v]) => !v).map(([k]) => k);
      if (missing.length) {
        setStatus(`Missing required field(s): ${missing.join(", ")}`, "error");
        return;
      }

      // ── Build payload ────────────────────────────────────────
      const payload = {
        firstName: get("firstName"),
        lastName: get("lastName"),
        phoneNumber,
        email: get("email"),
        trustedFormURL: get("trustedFormURL"),
        zip,
        state,
        city: get("city"),
        address: get("address"),
      };

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting…";

      try {
        const emailRes = await fetch("/api/send-email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const resBody = await emailRes.json().catch(() => ({}));

        if (!emailRes.ok) {
          const phonexaMsg = resBody.phonexaStatus
            ? ` Phonexa status: ${resBody.phonexaStatus}.`
            : "";
          throw new Error((resBody.error || "Submission failed.") + phonexaMsg);
        }

        setStatus(
          `Lead submitted and accepted by Phonexa.\nPost status: ${resBody.leadPostStatus}`,
          "ok"
        );
        form.reset();

      } catch (error) {
        setStatus(`Submission failed: ${error.message}`, "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Lead";
      }
    });
  </script>
</body>

</html>
